name: SQL Injection Detection CI/CD

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set Up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Flask
      run: |
        pip install flask

    - name: Validate Flask App
      run: |
        python -m py_compile app.py

    - name: Deployment Completed
      run: |
        echo "SQL Injection Detection System Successfully Deployed"
