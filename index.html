<!DOCTYPE html>
<html>

<head>

    <title>Cloud-Based SQL Injection Detection System</title>

    <style>

        body{
            background:#f4f4f4;
            font-family:Arial;
        }

        .container{
            width:350px;
            background:white;
            margin:auto;
            margin-top:120px;
            padding:30px;
            border-radius:10px;
            text-align:center;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px;
        }

        button{
            padding:10px 20px;
            background:blue;
            color:white;
            border:none;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>
            Cloud-Based SQL Injection Detection and Prevention System
        </h2>

        <form action="/login" method="POST">

            <input type="text"
                   name="username"
                   placeholder="Enter Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>

</html>
